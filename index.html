<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <!-- Assumign we'll put ::before css for image-->
             <p>EECU</p>
        </nav>
    </header>

    <h1>Budget Calculator</h1>
    
    <section id="career-input-section">
        <p>Career:</p>
        <select name="career" id="career-input"> <!--Should be a dropdown menu to search for career (API)-->
            <option value="default"></option>
            <option value="accountant">Accountant</option>
            <option value="architect">Architect</option>
            <option value="doctor">Doctor</option>
            <option value="engineer">Engineer</option>
            <option value="web-developer">Web Developer</option>
        </select>
    </section>

    <section id="category-education">
        <h2>Category 1: Education</h2>
        <div class="blue-background">
            <ul>
                <li>
                    <!--Assuming emoji will be a ::before css image-->
                    <section class="spending-input">
                        <p>Monthly Tuition</p>
                        <input type="text" id="monthly-tuition-input">
                    </section>
                    <img src="../images/info.svg">
                </li>
                <li>
                    <!--Assuming emoji will be a ::before css image-->
                    <p>Books & Supplies</p>
                    <input type="text" id="books-and-supplies-input">
                    <img src="../images/info.svg">
                </li>
                <li>
                    <!--Assuming emoji will be a ::before css image-->
                    <p>Dorm & Board</p>
                    <input type="text" id="dorms-and-board-input">
                    <img src="../images/info.svg">
                </li>
                <li>
                    <!--Assuming emoji will be a ::before css image-->
                    <p>Other Expenses</p>
                    <input type="text" id="other-expenses-input">
                    <img src="../images/info.svg">
                </li>
            </ul>
        </div>
    </section>

    <section id="chart-and-submit">
        <!--Idk how we're gonna put in the pie chart, assuming it's a JS thing, dunno what element tho-->
        <a href="Step2.html" type="submit">Continue</a>
    </section>

    <footer>
        <p>Important note: Some expenses may not apply to you. If so, just mark the expense amount to $0. </p>
    </footer>
</body>
</html>
